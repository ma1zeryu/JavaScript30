<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Console Tricks!</title>
    <link rel="icon" href="https://fav.farm/🔥" />
  </head>
  <body>
    <p onClick="makeGreen()">×BREAK×DOWN×</p>

    <script>
      const dogs = [
        { name: "Snickers", age: 2 },
        { name: "hugo", age: 8 },
      ];

      function makeGreen() {
        const p = document.querySelector("p");
        p.style.color = "#BADA55";
        p.style.fontSize = "50px";
      }

      // Regular
      console.log("hello");
      // Interpolated
      console.log(`Hello I an a ${"💩"} string!`);

      // Styled
      console.log(
        "%cI am some great text",
        "font-size: 50px; background: red; text-shadow: 10px 10px 0 blue",
      );
      // warning!
      console.warn("OH NOOO");

      // Error :|
      console.error("Shit!");

      // Info
      console.info("Crocodiles ear 3-4 peoplr per year");

      // Testing
      const p = document.querySelector("p");

      console.assert(
        p.classList.contains("ouch"),
        "You did not select the right Element!",
      );

      // clearing
      console.clear();

      // Viewing DOM Elements
      console.log(p);
      console.dir(p);

      // Grouping together
      dogs.forEach((dog) => {
        console.log(`${dog.name} is ${dog.age} years old`);
      });

      // counting
      console.count("Wes");
      console.count("Wes");
      console.count("Wes");
      console.count("Steve");

      // timing
      console.time("fetching data");
      fetch("https://api.github.com/users/wesbos")
        .then((data) => data.json())
        .then((data) => {
          console.timeEnd("fetching data");
          console.log(data);
        });
    </script>
  </body>
</html>
